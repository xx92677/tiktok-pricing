name: Build Native Mac App (M-Series)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 关键：使用 macos-14，它是 GitHub 提供的 M1 芯片运行环境
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 3.11 在 M 芯片上表现最稳

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        FILE_NAME=$(ls *.py | head -n 1)
        # --target-arch arm64 确保编译为 M 系列原生架构
        python -m PyInstaller --noconsole --onefile --clean \
               --target-arch arm64 \
               --name "TikTok定价助手_M芯片原生版" \
               "$FILE_NAME"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TikTok-Pricing-M-Silicon
        path: dist/
