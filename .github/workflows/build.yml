name: Build Mac App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # 升级到 v4

    - name: Set up Python
      uses: actions/setup-python@v5  # 升级到 v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        # 自动寻找仓库里的第一个 .py 文件
        FILE_NAME=$(ls *.py | head -n 1)
        echo "Found script: $FILE_NAME"
        python -m PyInstaller --noconsole --onefile --clean "$FILE_NAME"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4  # 核心修复：升级到 v4
      with:
        name: TikTok-Pricing-Tool-Mac
        path: dist/        # 导出整个 dist 文件夹
